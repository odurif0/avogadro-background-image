name: Build Plugin

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  AVOGADRO_TAG: "2.0.0"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libeigen3-dev libgl1-mesa-dev libglew-dev

      - name: Clone avogadrolibs
        run: git clone --depth 1 --branch ${{ env.AVOGADRO_TAG }} https://github.com/OpenChemistry/avogadrolibs.git ~/avogadrolibs

      - name: Build and install avogadrolibs (minimal)
        run: |
          cmake -S ~/avogadrolibs -B ~/avogadro-build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=$HOME/avogadro-install \
            -DUSE_VTK=OFF -DUSE_SPGLIB=OFF -DUSE_HDF5=OFF \
            -DUSE_LIBARCHIVE=OFF -DUSE_LIBMSYM=OFF -DUSE_MMTF=OFF \
            -DUSE_PLOTTER=OFF \
            -DBUILD_GPL_PLUGINS=OFF -DBUILD_MOLEQUEUE=OFF \
            -DWITH_COORDGEN=OFF -DBUILD_TESTING=OFF
          cmake --build ~/avogadro-build --target Core Rendering QtGui
          # Manually install libs (cmake --install fails on libgwavi which we didn't build)
          mkdir -p $HOME/avogadro-install/lib
          cp ~/avogadro-build/lib/libAvogadroQtGui.so* $HOME/avogadro-install/lib/
          cp ~/avogadro-build/lib/libAvogadroRendering.so* $HOME/avogadro-install/lib/
          cp ~/avogadro-build/lib/libAvogadroCore.so* $HOME/avogadro-install/lib/

      - name: Build plugin
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DAVOGADRO_SRC_DIR=$HOME/avogadrolibs \
            -DAVOGADRO_QTGUI_LIB=$HOME/avogadro-install/lib/libAvogadroQtGui.so.2.0.0 \
            -DAVOGADRO_RENDERING_LIB=$HOME/avogadro-install/lib/libAvogadroRendering.so.2.0.0
          cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundImageScenePlugin-linux-x86_64
          path: build/BackgroundImageScenePlugin.so

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone avogadrolibs
        run: git clone --depth 1 --branch $env:AVOGADRO_TAG https://github.com/OpenChemistry/avogadrolibs.git $env:USERPROFILE\avogadrolibs

      - name: Clone and install Eigen
        run: |
          git clone --depth 1 https://gitlab.com/libeigen/eigen.git $env:USERPROFILE\eigen
          cmake -S "$env:USERPROFILE\eigen" -B "$env:USERPROFILE\eigen-build" `
            -DCMAKE_INSTALL_PREFIX="$env:USERPROFILE\eigen-install" `
            -DEIGEN_BUILD_BLAS=OFF -DEIGEN_BUILD_LAPACK=OFF -DBUILD_TESTING=OFF
          cmake --build "$env:USERPROFILE\eigen-build" --target install --config ${{ env.BUILD_TYPE }}

      - name: Download and build GLEW
        shell: bash
        run: |
          curl -sL https://github.com/nigels-com/glew/releases/download/glew-2.2.0/glew-2.2.0.zip -o glew.zip
          unzip -q glew.zip
          cmake -S glew-2.2.0/build/cmake -B glew-build -DCMAKE_INSTALL_PREFIX="$USERPROFILE/glew-install"
          cmake --build glew-build --target install --config Release

      - name: Build avogadrolibs (minimal)
        run: |
          cmake -S "$env:USERPROFILE\avogadrolibs" -B "$env:USERPROFILE\avogadro-build" `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_INSTALL_PREFIX="$env:USERPROFILE\avogadro-install" `
            -DCMAKE_PREFIX_PATH="$env:USERPROFILE\eigen-install;$env:USERPROFILE\glew-install" `
            -DUSE_VTK=OFF -DUSE_SPGLIB=OFF -DUSE_HDF5=OFF `
            -DUSE_LIBARCHIVE=OFF -DUSE_LIBMSYM=OFF -DUSE_MMTF=OFF `
            -DBUILD_GPL_PLUGINS=OFF -DBUILD_MOLEQUEUE=OFF `
            -DWITH_COORDGEN=OFF -DBUILD_TESTING=OFF
          cmake --build "$env:USERPROFILE\avogadro-build" --target Core Rendering QtGui --config ${{ env.BUILD_TYPE }}

      - name: Install avogadrolibs
        shell: bash
        run: |
          cmake --install "$USERPROFILE/avogadro-build" --config ${{ env.BUILD_TYPE }} || true
          ls -la "$USERPROFILE/avogadro-install/bin/" 2>/dev/null || true
          find "$USERPROFILE/avogadro-install" -name "Avogadro*" -type f 2>/dev/null || true

      - name: Build plugin
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DAVOGADRO_SRC_DIR="$env:USERPROFILE\avogadrolibs" `
            -DEIGEN_SRC_DIR="$env:USERPROFILE\eigen" `
            -DAVOGADRO_QTGUI_LIB="$env:USERPROFILE\avogadro-install\bin\AvogadroQtGui.dll" `
            -DAVOGADRO_RENDERING_LIB="$env:USERPROFILE\avogadro-install\bin\AvogadroRendering.dll"
          cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundImageScenePlugin-windows-x86_64
          path: build/${{ env.BUILD_TYPE }}/BackgroundImageScenePlugin.dll

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'

      - name: Install dependencies
        run: brew install eigen glew

      - name: Clone avogadrolibs
        run: git clone --depth 1 --branch ${{ env.AVOGADRO_TAG }} https://github.com/OpenChemistry/avogadrolibs.git ~/avogadrolibs

      - name: Build and install avogadrolibs (minimal)
        run: |
          cmake -S ~/avogadrolibs -B ~/avogadro-build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=$HOME/avogadro-install \
            -DUSE_VTK=OFF -DUSE_SPGLIB=OFF -DUSE_HDF5=OFF \
            -DUSE_LIBARCHIVE=OFF -DUSE_LIBMSYM=OFF -DUSE_MMTF=OFF \
            -DUSE_PLOTTER=OFF \
            -DBUILD_GPL_PLUGINS=OFF -DBUILD_MOLEQUEUE=OFF \
            -DWITH_COORDGEN=OFF -DBUILD_TESTING=OFF
          cmake --build ~/avogadro-build --target Core Rendering QtGui
          # Manually install libs (cmake --install fails on libgwavi which we didn't build)
          mkdir -p $HOME/avogadro-install/lib
          cp ~/avogadro-build/lib/libAvogadroQtGui.* $HOME/avogadro-install/lib/
          cp ~/avogadro-build/lib/libAvogadroRendering.* $HOME/avogadro-install/lib/
          cp ~/avogadro-build/lib/libAvogadroCore.* $HOME/avogadro-install/lib/

      - name: Get Eigen prefix
        id: eigen
        run: echo "prefix=$(brew --prefix eigen)" >> $GITHUB_OUTPUT

      - name: Build plugin
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DAVOGADRO_SRC_DIR=$HOME/avogadrolibs \
            -DEIGEN_SRC_DIR=${{ steps.eigen.outputs.prefix }}/include/eigen3 \
            -DAVOGADRO_QTGUI_LIB=$HOME/avogadro-install/lib/libAvogadroQtGui.2.0.0.dylib \
            -DAVOGADRO_RENDERING_LIB=$HOME/avogadro-install/lib/libAvogadroRendering.2.0.0.dylib
          cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundImageScenePlugin-macos-arm64
          path: build/BackgroundImageScenePlugin.dylib

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mkdir release
          cp artifacts/BackgroundImageScenePlugin-linux-x86_64/BackgroundImageScenePlugin.so \
             release/BackgroundImageScenePlugin-linux-x86_64.so
          cp artifacts/BackgroundImageScenePlugin-windows-x86_64/BackgroundImageScenePlugin.dll \
             release/BackgroundImageScenePlugin-windows-x86_64.dll
          cp artifacts/BackgroundImageScenePlugin-macos-arm64/BackgroundImageScenePlugin.dylib \
             release/BackgroundImageScenePlugin-macos-arm64.dylib

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
